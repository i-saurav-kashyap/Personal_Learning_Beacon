version: 2
updates:
  # Application dependencies (Dependabot reads the pnpm lockfile under "npm").
  # Everything is rolled into ONE grouped PR (incl. majors) to keep noise low.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      all-npm:
        patterns:
          - "*"
    labels:
      - "dependencies"

  # GitHub Actions, also collapsed into a single grouped PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      all-actions:
        patterns:
          - "*"
    labels:
      - "ci"
